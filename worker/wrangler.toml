LLM_BASE_URL = "https://integrate.api.nvidia.com/v1"
LLM_CHAT_MODEL = "moonshotai/kimi-k2.5"
LLM_EMBED_MODEL = "nvidia/llama-3.2-nv-embedqa-1b-v1"
