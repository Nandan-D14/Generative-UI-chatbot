name = "visualmind-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "visualmind"
database_id = "3806928d-bb69-47a0-aacf-7fd5df308a2b"

[[vectorize]]
binding = "VECTORIZE"
index_name = "visualmind-kb"

[vars]
# NVIDIA
LLM_BASE_URL = "https://integrate.api.nvidia.com/v1"
LLM_CHAT_MODEL = "moonshotai/kimi-k2.5"
LLM_EMBED_MODEL = "nvidia/nv-embedqa-e5-v5"
LLM_EMBED_DIMENSIONS = 1024
FRONTEND_URL = "http://localhost:5173"

# Modal Research API — GLM-5.1 (commented out)
# LLM_BASE_URL = "https://api.us-west-2.modal.direct/v1"
# LLM_CHAT_MODEL = "zai-org/GLM-5.1-FP8"
# LLM_EMBED_MODEL = "zai-org/GLM-5.1"
# LLM_EMBED_DIMENSIONS = 2048
