name = "visualmind-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "visualmind"
database_id = "3806928d-bb69-47a0-aacf-7fd5df308a2b"

[[vectorize]]
binding = "VECTORIZE"
